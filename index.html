<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yang Jiang — Software Engineer</title>
<meta name="description" content="Yang Jiang — Software Engineer. Mobile engineering, AI agents. Auckland, New Zealand.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green:    #2d6b54;
    --bg:       #faf8f6;
    --surface:  #f2f0ed;
    --text:     #1a1a1a;
    --text-2:   #6e6e6e;
    --text-3:   #a0a09e;
    --rule-w:   3px;
    --gap:      2rem;
    --max-w:    640px;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg); color: var(--text);
    line-height: 1.6; -webkit-font-smoothing: antialiased;
    padding: 0 1.5rem;
  }

  main {
    max-width: var(--max-w); margin: 0.4rem auto 0;
    padding-left: calc(var(--gap) + var(--rule-w));
    position: relative;
  }
  main::before {
    content: ''; position: absolute;
    left: 0; top: 0; bottom: 0;
    width: var(--rule-w); background: var(--green); border-radius: 2px;
  }
  main::after {
    content: ''; position: absolute;
    left: -0.2rem; top: -0.1rem;
    width: 0.56rem; height: 0.56rem;
    background: var(--green); border-radius: 50%;
  }

  /* Lang pill */
  .lang-pill {
    display: inline-flex; gap: 0;
    background: var(--surface); border-radius: 100px;
    padding: 3px; font-size: 0.78rem; font-weight: 500;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .lang-pill button {
    border: none; background: transparent;
    padding: 0.48rem 0.8rem; border-radius: 100px;
    cursor: pointer; font-family: inherit; font-size: inherit; font-weight: 500;
    color: var(--text-3); transition: all 0.2s ease;
  }
  .lang-pill button.active { background: var(--green); color: #fff; }
  .lang-pill button:hover:not(.active) { color: var(--text); }

  /* Section label */
  .sec-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem; font-weight: 400; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--green);
    margin-bottom: 1.5rem;
  }

/* Keywords bridge */
  .kw-bridge {
    font-size: 0.95rem; color: var(--text-2); line-height: 1.6;
    margin-bottom: 1.75rem; text-wrap: pretty;
    font-style: italic;
  }

  /* Hero */
  .hero { padding-top: clamp(2rem,6vh,4rem); padding-bottom: 2rem; }
  .hero h1 {
    font-family: 'Space Mono', monospace;
    font-size: clamp(2.5rem,6vw,4.5rem); font-weight: 700;
    line-height: 1.08; letter-spacing: -0.02em; color: var(--text);
  }
  .hero .sub { display: flex; align-items: baseline; gap: 1rem; font-size: 1.05rem; color: var(--text-2); margin-top: 0.6rem; font-weight: 400; }
  .hero .tag { font-size: 0.95rem; color: var(--text-3); margin-top: 1rem; max-width: 420px; line-height: 1.6; }
  .hero .tag strong { color: var(--green); font-weight: 600; }

  /* Sections */
  section { padding: 2.5rem 0; }

  /* Keywords vertical stack */
  .kw-grid { display: flex; flex-direction: column; gap: 1.25rem; }
  .kw-group {
    padding-left: 0.75rem;
    border-left: 2px solid transparent;
    transition: border-color 0.2s ease;
  }
  .kw-group:hover { border-left-color: var(--green); }
  .kw-group h3 { font-size: 0.85rem; font-weight: 600; margin-bottom: 0.45rem; color: var(--text); }
  .kw-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; }
  .kw-tags span {
    font-size: 0.78rem; font-weight: 500; color: var(--text);
    background: var(--surface); padding: 0.25rem 0.7rem; border-radius: 5px;
    transition: transform 0.15s ease, background 0.15s ease;
  }
  .kw-tags span:hover { transform: translateY(-1px); background: #e8ede8; }

  /* Resume */
  .rs-summary { margin-bottom: 2.5rem; }
  .rs-summary p { font-size: 0.95rem; line-height: 1.65; color: var(--text); margin-bottom: 0.5rem; }

  .rs-block { margin-bottom: 2.5rem; }
  .rs-block:last-child { margin-bottom: 0; }
  .rs-block > h3 {
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem; font-weight: 400; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--green); margin-bottom: 1.25rem;
  }
  .rs-item {
    margin-bottom: 1.5rem;
    padding-left: 0.75rem; margin-left: -0.75rem;
    border-left: 2px solid transparent;
    transition: border-color 0.2s ease;
  }
  .rs-item:last-child { margin-bottom: 0; }
  .rs-item:hover { border-left-color: var(--green); }
  .rs-item-head { display: flex; align-items: baseline; gap: 1rem; flex-wrap: wrap; gap: 0.3rem; margin-bottom: 0.15rem; }
  .rs-item-head strong { font-size: 0.95rem; font-weight: 600; }
  .rs-item-head .date { font-size: 0.78rem; color: var(--text-3); white-space: nowrap; }
  .rs-role { font-size: 0.85rem; color: var(--text-2); margin-bottom: 0.5rem; }
  .rs-item ul { padding-left: 1.3rem; }
  .rs-item li { font-size: 0.85rem; line-height: 1.6; margin-bottom: 0.3rem; color: var(--text); }
  .rs-item li:last-child { margin-bottom: 0; }
  .rs-links { margin-top: 0.5rem; display: flex; flex-wrap: wrap; gap: 0.5rem 1rem; }
  .rs-links a { font-size: 0.85rem; color: var(--green); text-decoration: none; font-weight: 500; }
  .rs-links a:hover { text-decoration: underline; }

  /* Footer */
  footer { padding: 2.5rem 0 4rem; }
  .footer-email { margin-bottom: 0.35rem; font-size: 0.95rem; }
  .footer-email a { color: var(--green); text-decoration: none; font-weight: 500; }
  .footer-email a:hover { text-decoration: underline; }
  .footer-sep { color: var(--text-3); margin: 0 0.45rem; }
  .footer-wechat { color: var(--text-2); }
  .footer-location { font-size: 0.78rem; color: var(--text-3); }

  /* Mobile */
  @media (max-width: 560px) {
    main { padding-left: calc(1.25rem + var(--rule-w)); }
    .hero { padding-top: 2.5rem; }
    section { padding: 2rem 0; }
    .rs-item-head { flex-direction: column; }
  }

  @media (prefers-reduced-motion: no-preference) {
    main:not(.loaded)::before {
      transform-origin: top;
      animation: drawRule 0.4s ease-out both;
    }
    main:not(.loaded)::after {
      animation: revealDot 0.25s 0.35s ease-out both;
    }
    main:not(.loaded) .hero {
      animation: fadeUp 0.4s 0.15s ease-out both;
    }
    main:not(.loaded) section,
    main:not(.loaded) footer {
      animation: fadeUp 0.4s 0.3s ease-out both;
    }
  }

  @keyframes drawRule {
    from { transform: scaleY(0); }
    to   { transform: scaleY(1); }
  }
  @keyframes revealDot {
    from { transform: scale(0); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (prefers-reduced-motion: reduce) {
    html { scroll-behavior: auto; }
    *, *::before, *::after { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>

<main>
  <!-- populated by JS -->
</main>

<script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
<script>
// ── Formatting helpers ──
function formatText(text) {
  if (!text) return '';
  return text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
}

// ── Language resolver ──
// Walks the YAML tree. Any object with {en, cn} keys is a lang-map — pick the
// matching language. Arrays and plain objects recurse. Primitives pass through.
const resolveLang = (node, lang) => {
  if (node === null || node === undefined) return node;
  if (Array.isArray(node)) return node.map(v => resolveLang(v, lang));
  if (typeof node === 'object') {
    if ('en' in node && 'cn' in node) return resolveLang(node[lang], lang);
    const out = {};
    Object.keys(node).forEach(k => { out[k] = resolveLang(node[k], lang); });
    return out;
  }
  return node;
};

// ── Renderer ──
const render = (d) => {
  let h = '';

  // Hero
  h += `<header class="hero">
  <h1>${d.name.replace(/\n/g, '<br>')}</h1>
  <p class="sub"><span class="lang-pill">
  <button class="active" id="btn-en" onclick="switchLang('en')">EN</button>
  <button id="btn-cn" onclick="switchLang('cn')">中文</button>
  </span> <span>${d.title}</span></p>
  <p class="tag">${formatText(d.summary)}</p>
  </header>`;

  // Keywords
  h += '<section>';
  h += `<h2 class="sec-label">${d.keywords.label}</h2>`;
  if (d.keywords.bridge) h += `<p class="kw-bridge">${d.keywords.bridge}</p>`;
  h += '<div class="kw-grid">';
  d.keywords.groups.forEach(kw => {
    h += `<div class="kw-group"><h3>${kw.name}</h3><div class="kw-tags">`;
    kw.tags.forEach(t => { h += `<span>${t}</span>`; });
    h += '</div></div>';
  });
  h += '</div></section>';

  // Resume
  h += '<section>';
  h += `<h2 class="sec-label">${d.resume.label}</h2>`;

  if (d.resume.bridge) {
    h += `<div class="rs-summary"><p>${d.resume.bridge}</p></div>`;
  }

  d.resume.sections.forEach(sec => {
    h += `<div class="rs-block"><h3>${sec.title}</h3>`;
    sec.items.forEach(item => {
      h += '<div class="rs-item">';
      h += `<div class="rs-item-head"><strong>${item.name}</strong>`;
      const metaParts = [];
      if (item.location) metaParts.push(item.location);
      if (item.period) metaParts.push(item.period);
      if (metaParts.length) h += `<span class="date">${metaParts.join(' · ')}</span>`;
      h += '</div>';
      if (item.role) h += `<p class="rs-role">${item.role}</p>`;
      if (item.bullets && item.bullets.length) {
        h += '<ul>';
        item.bullets.forEach(b => { h += `<li>${b}</li>`; });
        h += '</ul>';
      }
      if (item.links && item.links.length) {
        h += '<div class="rs-links">';
        item.links.forEach(l => { h += `<a href="${l.url}">${l.text}</a>`; });
        h += '</div>';
      }
      h += '</div>';
    });
    h += '</div>';
  });

  h += '</section>';

  // Footer
  h += '<footer>';
  h += `<p class="footer-email"><a href="mailto:${d.email}">${d.email}</a></p>`;
  h += `<p class="footer-location">${d.current_location} · ${d.last_modified}</p>`;
  h += '</footer>';

  return h;
};

// ── App ──
const cache = {};

const load = async (lang) => {
  try {
    if (!cache.yaml) {
      const res = await fetch('resume.yaml');
      if (!res.ok) throw new Error(`Failed to load resume data (${res.status})`);
      const text = await res.text();
      cache.yaml = jsyaml.load(text);
    }
    const data = resolveLang(cache.yaml, lang);
    document.querySelector('main').innerHTML = render(data);
    document.getElementById('btn-en').classList.toggle('active', lang === 'en');
    document.getElementById('btn-cn').classList.toggle('active', lang === 'cn');
    localStorage.setItem('lang', lang);
  } catch (err) {
    document.querySelector('main').innerHTML = '<p style="padding:2rem;color:var(--text-2);">Failed to load resume. Check your connection and try again.</p>';
    console.error(err);
  }
};

document.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('lang') || 'en';
  load(saved).then(() => {
    setTimeout(() => { document.querySelector('main').classList.add('loaded'); }, 600);
  });
});
window.switchLang = lang => {
  load(lang);
  window.scrollTo({ top: 0, behavior: 'smooth' });
};
</script>
</body>
</html>
