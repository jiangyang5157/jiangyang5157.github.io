<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yang Jiang — Software Engineer</title>
<meta name="description" content="Yang Jiang — Software Engineer. Mobile engineering, AI agents. Auckland, New Zealand.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green:    #2d6b54;
    --bg:       #faf8f6;
    --surface:  #f2f0ed;
    --text:     #1a1a1a;
    --text-2:   #6e6e6e;
    --text-3:   #a0a09e;
    --border:   #e6e4e0;
    --rule-w:   3px;
    --gap:      2rem;
    --max-w:    640px;
  }

  html { scroll-behavior: smooth; scroll-padding-top: 2rem; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg); color: var(--text);
    line-height: 1.6; -webkit-font-smoothing: antialiased;
    padding: 0 1.5rem;
  }

  main {
    max-width: var(--max-w); margin: 0.4rem auto 0;
    padding-left: calc(var(--gap) + var(--rule-w));
    position: relative;
  }
  main::before {
    content: ''; position: absolute;
    left: 0; top: 0; bottom: 0;
    width: var(--rule-w); background: var(--green); border-radius: 2px;
  }
  main::after {
    content: ''; position: absolute;
    left: -0.2rem; top: -0.1rem;
    width: 0.56rem; height: 0.56rem;
    background: var(--green); border-radius: 50%;
  }

  /* Lang pill */
  .lang-pill {
    display: inline-flex; gap: 0;
    background: var(--surface); border-radius: 100px;
    padding: 3px; font-size: 0.76rem; font-weight: 500;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .lang-pill button {
    border: none; background: transparent;
    padding: 0.48rem 0.8rem; border-radius: 100px;
    cursor: pointer; font-family: inherit; font-size: inherit; font-weight: 500;
    color: var(--text-3); transition: all 0.2s ease;
  }
  .lang-pill button.active { background: var(--green); color: #fff; }
  .lang-pill button:hover:not(.active) { color: var(--text); }

  /* Section label */
  .sec-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem; font-weight: 400; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--green);
    margin-bottom: 1.5rem;
  }

  /* Hero */
  .hero { padding-top: clamp(4rem,12vh,7rem); padding-bottom: 2rem; }
  .hero h1 {
    font-family: 'Space Mono', monospace;
    font-size: clamp(2.5rem,6vw,4.5rem); font-weight: 700;
    line-height: 1.08; letter-spacing: -0.02em; color: var(--text);
  }
  .hero .sub { font-size: 1.05rem; color: var(--text-2); margin-top: 0.6rem; font-weight: 400; }
  .hero .tag { font-size: 0.9rem; color: var(--text-3); margin-top: 1rem; max-width: 420px; line-height: 1.6; }
  .hero .act-row { display: grid; grid-template-columns: 1fr 1fr; align-items: center; margin-top: 2rem; }
  .hero .cta {
    display: inline-block;
    padding: 0.55rem 1.5rem; font-size: 0.88rem; font-weight: 500;
    color: var(--green); border: 1.5px solid var(--green); border-radius: 100px;
    text-decoration: none; transition: all 0.2s ease;
  }
  .hero .cta:hover { background: var(--green); color: #fff; }

  /* Sections */
  section { padding: 3.5rem 0; }

  /* Keywords grid */
  .kw-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem 2.5rem; }
  .kw-group h3 { font-size: 0.85rem; font-weight: 600; margin-bottom: 0.6rem; }
  .kw-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; }
  .kw-tags span {
    font-size: 0.78rem; font-weight: 500; color: var(--text);
    background: var(--surface); padding: 0.25rem 0.7rem; border-radius: 5px;
    transition: transform 0.15s ease, background 0.15s ease;
  }
  .kw-tags span:hover { transform: translateY(-1px); background: #e8ede8; }

  /* Resume */
  .rs-summary { margin-bottom: 2.5rem; }
  .rs-summary p { font-size: 0.9rem; line-height: 1.65; color: var(--text); margin-bottom: 0.5rem; }

  .rs-block { margin-bottom: 2.5rem; }
  .rs-block:last-child { margin-bottom: 0; }
  .rs-block > h3 {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem; font-weight: 400; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--green); margin-bottom: 1.25rem;
  }
  .rs-item { margin-bottom: 1.5rem; }
  .rs-item:last-child { margin-bottom: 0; }
  .rs-item-head { display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; gap: 0.3rem; margin-bottom: 0.15rem; }
  .rs-item-head strong { font-size: 0.93rem; font-weight: 600; }
  .rs-item-head .date { font-size: 0.82rem; color: var(--text-3); white-space: nowrap; }
  .rs-role { font-size: 0.85rem; color: var(--text-2); margin-bottom: 0.5rem; }
  .rs-item ul { padding-left: 1.3rem; }
  .rs-item li { font-size: 0.87rem; line-height: 1.6; margin-bottom: 0.3rem; color: var(--text); }
  .rs-item li:last-child { margin-bottom: 0; }
  .rs-links { margin-top: 0.5rem; display: flex; flex-wrap: wrap; gap: 0.5rem 1rem; }
  .rs-links a { font-size: 0.85rem; color: var(--green); text-decoration: none; font-weight: 500; }
  .rs-links a:hover { text-decoration: underline; }

  /* Contact */
  .contact { padding: 2.5rem 0 1.5rem; }
  .contact a { color: var(--green); text-decoration: none; font-weight: 500; }
  .contact a:hover { text-decoration: underline; }
  .contact p { font-size: 0.9rem; color: var(--text-2); }

  footer { padding: 0 0 4rem; font-size: 0.78rem; color: var(--text-3); }

  /* Mobile */
  @media (max-width: 560px) {
    main { padding-left: 0; padding-top: var(--rule-w); }
    main::before { top: 0; left: 0; right: 0; bottom: auto; width: 100%; height: var(--rule-w); }
    main::after { top: -0.05rem; left: 0; }
    .hero { padding-top: 2.5rem; }
    .kw-grid { grid-template-columns: 1fr; }
    section { padding: 2.5rem 0; }
    .rs-item-head { flex-direction: column; }
  }

  @media (prefers-reduced-motion: reduce) {
    html { scroll-behavior: auto; }
    *, *::before, *::after { transition: none !important; }
  }
</style>
</head>
<body>

<main>
  <!-- populated by JS -->
</main>

<script>
// ── Inline markdown helpers ──
function parseInline(text) {
  return text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
}

function renderLinks(raw) {
  if (!raw) return '';
  const links = raw.match(/\[([^\]]+)\]\(([^)]+)\)/g) || [];
  return links.map(l => {
    const m = l.match(/\[([^\]]+)\]\(([^)]+)\)/);
    return `<a href="${m[2]}">${m[1]}</a>`;
  }).join(' ');
}

// ── Parser ──
function parse(text) {
  const lines = text.split('\n');
  const data = {
    hero: { name: '', subtitle: '', tagline: '', cta: '' },
    keywords_label: '',
    keywords: [],
    contact: '',
    footer: '',
    resume: { summary: [], sections: [] }
  };

  let i = 0;

  // Phase 1: metadata (until first ---)
  while (i < lines.length) {
    const line = lines[i].trim();
    if (line === '---') { i++; break; }
    if (line.startsWith('# ')) data.hero.name = line.slice(2);
    else if (line.startsWith('## ')) data.hero.subtitle = line.slice(3);
    else if (line.startsWith('@tagline ')) data.hero.tagline = parseInline(line.slice(9));
    else if (line.startsWith('@cta ')) data.hero.cta = line.slice(5);
    else if (line.startsWith('@keywords_label ')) data.keywords_label = line.slice(16);
    else if (line.startsWith('@contact ')) data.contact = line.slice(9);
    else if (line.startsWith('@footer ')) data.footer = line.slice(8);
    i++;
  }

  // Phase 2: keywords (until --- or ## Resume)
  while (i < lines.length) {
    const line = lines[i].trim();
    if (line === '---') { i++; break; }
    if (line === '## Resume' || line === '## 简历') { break; }
    if (line.startsWith('### ')) {
      const group = { name: parseInline(line.slice(4)), tags: [] };
      i++;
      while (i < lines.length && lines[i].trim().startsWith('- ')) {
        group.tags.push(lines[i].trim().slice(2));
        i++;
      }
      data.keywords.push(group);
    } else {
      i++;
    }
  }

  // Phase 3: resume
  if (i < lines.length && (lines[i].trim() === '## Resume' || lines[i].trim() === '## 简历')) {
    i++;
  }

  // Parse summary paragraphs (text before first ###)
  while (i < lines.length) {
    const line = lines[i].trim();
    if (line.startsWith('### ')) break;
    if (line !== '' && !line.startsWith('---')) {
      data.resume.summary.push(parseInline(line));
    }
    i++;
  }

  // Parse resume sections (### Section)
  while (i < lines.length) {
    const line = lines[i].trim();
    if (line === '---' || line === '') { i++; continue; }
    if (line.startsWith('### ')) {
      const section = { title: parseInline(line.slice(4)), items: [] };
      i++;
      // Parse items within section (#### Item)
      while (i < lines.length) {
        const l2 = lines[i].trim();
        if (l2.startsWith('### ') || l2 === '---') break;
        if (l2.startsWith('#### ')) {
          const item = { name: parseInline(l2.slice(5)), meta: '', role: '', bullets: [], links: [] };
          i++;
          while (i < lines.length) {
            const l3 = lines[i].trim();
            if (l3.startsWith('#### ') || l3.startsWith('### ') || l3 === '---') break;
            if (l3.startsWith('@meta ')) item.meta = parseInline(l3.slice(6));
            else if (l3.startsWith('@role ')) item.role = parseInline(l3.slice(6));
            else if (l3.startsWith('- ')) item.bullets.push(parseInline(l3.slice(2)));
            else if (l3.startsWith('@link ')) item.links.push(parseInline(l3.slice(6)));
            i++;
          }
          section.items.push(item);
        } else {
          i++;
        }
      }
      data.resume.sections.push(section);
    } else {
      i++;
    }
  }

  return data;
}

// ── Renderer ──
function render(data) {
  let h = '';

  // Hero
  h += '<header class="hero">';
  h += `<h1>${data.hero.name.replace(/\n/g,'<br>')}</h1>`;
  h += `<p class="sub">${data.hero.subtitle}</p>`;
  h += `<p class="tag">${data.hero.tagline}</p>`;
  h += '<div class="act-row">';
  h += `<a href="#resume" class="cta">${data.hero.cta}</a>`;
  h += '<div class="lang-pill">';
  h += `<button class="active" id="btn-en" onclick="switchLang('en')">EN</button>`;
  h += `<button id="btn-cn" onclick="switchLang('cn')">中文</button>`;
  h += '</div></div></header>';

  // Keywords
  h += '<section>';
  h += `<h2 class="sec-label">${data.keywords_label}</h2>`;
  h += '<div class="kw-grid">';
  data.keywords.forEach(kw => {
    h += `<div class="kw-group"><h3>${kw.name}</h3><div class="kw-tags">`;
    kw.tags.forEach(t => { h += `<span>${t}</span>`; });
    h += '</div></div>';
  });
  h += '</div></section>';

  // Resume
  h += '<section id="resume">';
  h += '<h2 class="sec-label">Resume</h2>';

  // Summary
  if (data.resume.summary.length) {
    h += '<div class="rs-summary">';
    data.resume.summary.forEach(p => { h += `<p>${p}</p>`; });
    h += '</div>';
  }

  // Sections
  data.resume.sections.forEach(sec => {
    h += `<div class="rs-block"><h3>${sec.title}</h3>`;
    sec.items.forEach(item => {
      h += '<div class="rs-item">';
      h += `<div class="rs-item-head"><strong>${item.name}</strong>`;
      if (item.meta) h += `<span class="date">${item.meta}</span>`;
      h += '</div>';
      if (item.role) h += `<p class="rs-role">${item.role}</p>`;
      if (item.bullets.length) {
        h += '<ul>';
        item.bullets.forEach(b => { h += `<li>${b}</li>`; });
        h += '</ul>';
      }
      if (item.links.length) {
        h += `<div class="rs-links">${item.links.join(' ')}</div>`;
      }
      h += '</div>';
    });
    h += '</div>';
  });

  h += '</section>';

  // Contact
  h += `<section class="contact"><p><a href="mailto:${data.contact}">${data.contact}</a></p></section>`;
  h += `<footer><p>${data.footer}</p></footer>`;

  return h;
}

// ── App ──
const cache = {};

async function load(lang) {
  const file = lang === 'en' ? 'resume_en.md' : 'resume_cn.md';
  if (!cache[lang]) {
    const res = await fetch(file);
    const text = await res.text();
    cache[lang] = parse(text);
  }
  document.querySelector('main').innerHTML = render(cache[lang]);
  document.getElementById('btn-en').classList.toggle('active', lang === 'en');
  document.getElementById('btn-cn').classList.toggle('active', lang === 'cn');
}

document.addEventListener('DOMContentLoaded', () => load('en'));
window.switchLang = lang => {
  load(lang);
  window.scrollTo({ top: 0, behavior: 'smooth' });
};
</script>
</body>
</html>
